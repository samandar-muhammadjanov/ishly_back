version: '3.9'

services:
  # ----------------------------
  # Django Web Application
  # ----------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: gig_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gig_network
    restart: unless-stopped

  # ----------------------------
  # Celery Worker
  # ----------------------------
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: gig_celery_worker
    command: celery -A config.celery worker --loglevel=info --concurrency=4 -Q default,notifications,otp
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gig_network
    restart: unless-stopped

  # ----------------------------
  # Celery Beat (Scheduler)
  # ----------------------------
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: gig_celery_beat
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gig_network
    restart: unless-stopped

  # ----------------------------
  # Celery Flower (Monitor)
  # ----------------------------
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: gig_flower
    command: celery -A config.celery flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    networks:
      - gig_network

  # ----------------------------
  # PostgreSQL Database
  # ----------------------------
  db:
    image: postgres:15-alpine
    container_name: gig_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${DB_NAME:-gig_marketplace}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gig_marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gig_network
    restart: unless-stopped

  # ----------------------------
  # Redis Cache & Broker
  # ----------------------------
  redis:
    image: redis:7-alpine
    container_name: gig_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gig_network
    restart: unless-stopped

  # ----------------------------
  # Nginx (Reverse Proxy)
  # ----------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: gig_nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - gig_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  gig_network:
    driver: bridge
